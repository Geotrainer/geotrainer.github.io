<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geo Aufgaben-Trainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --op:    #085041; --op-bg:    #d4efe6;
  --kon:   #0C447C; --kon-bg:   #dceaf8;
  --mat:   #633806; --mat-bg:   #fae6c0;
  --geo:   #5b2a8a; --geo-bg:   #ecdefa;
  --ein:   #712B13; --ein-bg:   #f9d9cf;
  --badge-e-bg:#e6f4d4; --badge-e:#2d5a1b;
  --badge-r-bg:#fde8e3; --badge-r:#8b2500;
  --badge-m-bg:#dce9fb; --badge-m:#0d3a6e;
  --badge-o-bg:#ece9fd; --badge-o:#3d2f8f;
  --ink:   #1a1512;
  --muted: #6b6560;
  --line:  #e0dbd5;
  --bg:    #f7f4ef;
  --card:  #ffffff;
  --mat-hint-bg:#fdf7e8; --mat-hint-b:#d4a017; --mat-hint-t:#5a3e00;
  --qua-hint-bg:#edeafc; --qua-hint-b:#7c6fcd; --qua-hint-t:#2d2070;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;overflow-x:hidden;}

.topbar{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--ink);display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:52px;}
.topbar-title{font-family:'DM Serif Display',serif;color:#fff;font-size:1rem;letter-spacing:.02em;}
.progress-wrap{display:flex;align-items:center;gap:1rem;}
.progress-label{color:#aaa;font-size:.75rem;letter-spacing:.06em;text-transform:uppercase;}
.progress-bar-outer{width:160px;height:4px;background:#444;border-radius:2px;overflow:hidden;}
.progress-bar-inner{height:100%;background:#74c69d;border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1);}
.progress-num{color:#fff;font-size:.8rem;font-weight:500;min-width:2.5rem;text-align:right;}

.stage{min-height:100vh;padding:72px 1rem 3rem;display:flex;flex-direction:column;align-items:center;}

.card{background:var(--card);border-radius:16px;box-shadow:0 2px 24px rgba(0,0,0,.07),0 1px 4px rgba(0,0,0,.04);max-width:740px;width:100%;overflow:hidden;animation:rise .45s cubic-bezier(.4,0,.2,1) both;}
@keyframes rise{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
.card-header{background:var(--ink);padding:1.25rem 1.75rem;display:flex;align-items:center;justify-content:space-between;}
.card-label{font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:#aaa;font-weight:500;}
.card-num{font-family:'DM Serif Display',serif;font-size:1.5rem;color:#fff;}
.card-body{padding:2rem 1.75rem;}

.legend{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1.25rem;}
.leg-item{display:flex;align-items:center;gap:5px;font-size:.7rem;color:var(--muted);letter-spacing:.04em;cursor:pointer;padding:5px 10px;border-radius:20px;border:1.5px solid transparent;transition:all .2s;user-select:none;}
.leg-item:hover{border-color:currentColor;}
.leg-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0;}
.leg-item.active-tool{border-color:currentColor;background:rgba(0,0,0,.04);font-weight:600;}

.aufgabe-instruction{font-size:.75rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:1rem;font-weight:500;}

.interactive-text{font-family:'DM Serif Display',serif;font-size:1.2rem;line-height:2.1;margin-bottom:1.5rem;}
.word{display:inline;cursor:pointer;border-radius:3px;padding:1px 0;transition:background .12s,color .12s;}
.word[data-marked="op"] {background:var(--op-bg); color:var(--op); font-weight:600;padding:1px 4px;border-radius:4px;}
.word[data-marked="kon"]{background:var(--kon-bg);color:var(--kon);font-weight:600;padding:1px 4px;border-radius:4px;}
.word[data-marked="mat"]{background:var(--mat-bg);color:var(--mat);font-weight:600;padding:1px 4px;border-radius:4px;}
.word[data-marked="geo"]{background:var(--geo-bg);color:var(--geo);font-weight:600;padding:1px 4px;border-radius:4px;}
.word[data-marked="ein"]{background:var(--ein-bg);color:var(--ein);font-weight:600;padding:1px 4px;border-radius:4px;}
body[data-tool="op"]  .word:not([data-marked]):hover{background:var(--op-bg);}
body[data-tool="kon"] .word:not([data-marked]):hover{background:var(--kon-bg);}
body[data-tool="mat"] .word:not([data-marked]):hover{background:var(--mat-bg);}
body[data-tool="geo"] .word:not([data-marked]):hover{background:var(--geo-bg);}
body[data-tool="ein"] .word:not([data-marked]):hover{background:var(--ein-bg);}

.hint-row{display:flex;align-items:center;gap:.5rem;font-size:.75rem;color:var(--muted);margin-bottom:.5rem;}
.hint-dot{width:6px;height:6px;border-radius:50%;background:currentColor;}

.btn{display:inline-flex;align-items:center;gap:.5rem;padding:.75rem 1.5rem;border-radius:10px;border:none;font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s;letter-spacing:.01em;}
.btn-primary{background:var(--ink);color:#fff;}
.btn-primary:hover{background:#2d2926;transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.2);}
.btn-primary:active{transform:translateY(0);}
.btn-ghost{background:transparent;color:var(--muted);border:1.5px solid var(--line);}
.btn-ghost:hover{border-color:var(--ink);color:var(--ink);}
.btn-success{background:#2d6a4f;color:#fff;}
.btn-success:hover{background:#235a41;transform:translateY(-1px);}
.btn-row{display:flex;gap:.75rem;flex-wrap:wrap;align-items:center;}

.compare-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem;}
@media(max-width:580px){.compare-row{grid-template-columns:1fr;}}
.compare-col label{font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:600;display:block;margin-bottom:.5rem;}
.compare-text{font-family:'DM Serif Display',serif;font-size:1rem;line-height:1.85;padding:1rem;border-radius:10px;background:var(--bg);border:1px solid var(--line);}

.badge{display:inline-flex;align-items:center;font-size:.72rem;font-weight:600;letter-spacing:.03em;padding:4px 10px;border-radius:20px;margin-bottom:.75rem;}
.badge-e{background:var(--badge-e-bg);color:var(--badge-e);}
.badge-r{background:var(--badge-r-bg);color:var(--badge-r);}
.badge-m{background:var(--badge-m-bg);color:var(--badge-m);}
.badge-o{background:var(--badge-o-bg);color:var(--badge-o);}

.steps-label{font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:.6rem;}
.step-list{list-style:none;display:flex;flex-direction:column;gap:.5rem;margin-bottom:1.25rem;}
.step-list li{display:flex;gap:.6rem;align-items:flex-start;font-size:.875rem;line-height:1.6;}
.step-num{width:20px;height:20px;border-radius:50%;background:var(--ink);color:#fff;font-size:.65rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}

.hint-block{display:flex;gap:.6rem;align-items:flex-start;padding:.6rem .85rem;border-radius:8px;font-size:.8rem;line-height:1.55;margin-bottom:.5rem;border-left:3px solid;}
.hint-mat{background:var(--mat-hint-bg);border-color:var(--mat-hint-b);color:var(--mat-hint-t);}
.hint-qua{background:var(--qua-hint-bg);border-color:var(--qua-hint-b);color:var(--qua-hint-t);}
.hint-icon{font-size:.85rem;flex-shrink:0;}

.s-op {background:var(--op-bg); color:var(--op); font-weight:600;padding:0 3px;border-radius:3px;}
.s-kon{background:var(--kon-bg);color:var(--kon);font-weight:600;padding:0 3px;border-radius:3px;}
.s-mat{background:var(--mat-bg);color:var(--mat);font-weight:600;padding:0 3px;border-radius:3px;}
.s-geo{background:var(--geo-bg);color:var(--geo);font-weight:600;padding:0 3px;border-radius:3px;}
.s-ein{background:var(--ein-bg);color:var(--ein);font-weight:600;padding:0 3px;border-radius:3px;}

.done-card{text-align:center;padding:3rem 2rem;}
.done-icon{font-size:3rem;margin-bottom:1rem;}
.done-title{font-family:'DM Serif Display',serif;font-size:2rem;margin-bottom:.5rem;}
.done-sub{color:var(--muted);margin-bottom:2rem;}

.divider{border:none;border-top:1px solid var(--line);margin:1.25rem 0;}

.legend-static{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1.25rem;padding:.6rem .9rem;background:var(--bg);border-radius:8px;border:1px solid var(--line);}
.leg-static{display:flex;align-items:center;gap:5px;font-size:.68rem;font-weight:500;}

/* dropdown jump */
.jump-wrap{position:relative;display:flex;align-items:center;gap:.5rem;}
.jump-label{color:#aaa;font-size:.7rem;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;}
.jump-select{appearance:none;-webkit-appearance:none;background:#2a2725;color:#fff;border:1px solid #555;border-radius:7px;padding:.25rem .5rem .25rem .6rem;font-family:'DM Sans',sans-serif;font-size:.8rem;cursor:pointer;outline:none;max-width:220px;padding-right:1.6rem;}
.jump-select:hover{border-color:#888;}
.jump-select:focus{border-color:#74c69d;}
.jump-arrow{position:absolute;right:.45rem;top:50%;transform:translateY(-50%);pointer-events:none;color:#aaa;font-size:.6rem;}
@media(max-width:600px){.jump-label{display:none;}.jump-select{max-width:140px;font-size:.72rem;}}
</style>
</head>
<body data-tool="op">
<div class="topbar">
  <div class="topbar-title">Geo Aufgaben-Trainer</div>
  <div class="progress-wrap">
    <div class="jump-wrap">
      <span class="jump-label">Aufgabe</span>
      <select class="jump-select" id="jumpSelect" title="Direkt zu einer Aufgabe springen"></select>
      <span class="jump-arrow">&#9660;</span>
    </div>
    <span class="progress-label">Fortschritt</span>
    <div class="progress-bar-outer"><div class="progress-bar-inner" id="pbar" style="width:0%"></div></div>
    <span class="progress-num" id="pnum">0 / 31</span>
  </div>
</div>
<div class="stage" id="stage"></div>

<script>

const TOTAL = DATA.aufgaben.length;
let current = 0;
let currentTool = 'op';
let wordMarks = {};

const LEGEND_ITEMS = [
  {type:'op',  label:'Operator',           bg:'#d4efe6', border:'#085041', text:'#085041'},
  {type:'kon', label:'Konzept / Begriff',   bg:'#dceaf8', border:'#0C447C', text:'#0C447C'},
  {type:'mat', label:'Material (M1, M5\u2026)',bg:'#fae6c0', border:'#a05c0f', text:'#633806'},
  {type:'geo', label:'Raumbezug',           bg:'#ecdefa', border:'#7b3db0', text:'#5b2a8a'},
  {type:'ein', label:'Einschr\u00e4nkung', bg:'#f9d9cf', border:'#b04020', text:'#712B13'},
  {type:'none',label:'Keine Markierung',    bg:'#e8e4de', border:'#999',    text:'#6b6560'},
];

function setProgress(n){
  document.getElementById('pbar').style.width=Math.round((n/TOTAL)*100)+'%';
  document.getElementById('pnum').textContent=n+' / '+TOTAL;
  const sel=document.getElementById('jumpSelect');
  if(sel) sel.value=String(n);
}

function initDropdown(){
  const sel=document.getElementById('jumpSelect');
  DATA.aufgaben.forEach((text,i)=>{
    const opt=document.createElement('option');
    opt.value=String(i);
    // Truncate long texts for display
    const preview=text.length>48?text.slice(0,45)+'\u2026':text;
    opt.textContent=(i+1)+'. '+preview;
    sel.appendChild(opt);
  });
  sel.addEventListener('change',()=>{
    const idx=parseInt(sel.value,10);
    if(!isNaN(idx)&&idx>=0&&idx<TOTAL){
      current=idx;
      renderAufgabe();
    }
  });
}

function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function segmentsToHtml(segs){
  return segs.map(s=>s.type?'<span class="s-'+s.type+'">'+esc(s.text)+'</span>':'<span>'+esc(s.text)+'</span>').join('');
}

function buildLegendInteractive(){
  const d=document.createElement('div');
  d.className='legend';
  d.id='legend';
  LEGEND_ITEMS.forEach(item=>{
    const el=document.createElement('div');
    el.className='leg-item'+(item.type==='op'?' active-tool':'');
    el.dataset.type=item.type;
    el.style.color=item.text;
    el.innerHTML='<div class="leg-dot" style="background:'+item.bg+';outline:2px solid '+item.border+'"></div>'+esc(item.label);
    el.addEventListener('click',()=>{
      document.querySelectorAll('.leg-item').forEach(l=>l.classList.remove('active-tool'));
      el.classList.add('active-tool');
      currentTool=item.type;
      document.body.dataset.tool=currentTool;
    });
    d.appendChild(el);
  });
  return d;
}

function buildLegendStatic(){
  const d=document.createElement('div');
  d.className='legend-static';
  LEGEND_ITEMS.filter(i=>i.type!=='none').forEach(item=>{
    const el=document.createElement('div');
    el.className='leg-static';
    el.style.color=item.text;
    el.innerHTML='<div class="leg-dot" style="background:'+item.bg+';outline:1.5px solid '+item.border+';width:12px;height:12px;border-radius:3px;flex-shrink:0"></div>'+esc(item.label);
    d.appendChild(el);
  });
  return d;
}

function tokenize(text){
  const tokens=[];const re=/(\S+|\s+)/g;let m;
  while((m=re.exec(text))!==null)tokens.push(m[0]);
  return tokens;
}

function buildUserMarkedHtml(tokens){
  return tokens.map((tok,i)=>{
    if(/^\s+$/.test(tok))return tok;
    const mark=wordMarks[i];
    return mark?'<span class="s-'+mark+'">'+esc(tok)+'</span>':'<span>'+esc(tok)+'</span>';
  }).join('');
}

function markWord(span,idx){
  const t=currentTool;
  if(t==='none'){delete wordMarks[idx];span.removeAttribute('data-marked');}
  else if(wordMarks[idx]===t){delete wordMarks[idx];span.removeAttribute('data-marked');}
  else{wordMarks[idx]=t;span.dataset.marked=t;}
}

function renderAufgabe(){
  wordMarks={};currentTool='op';document.body.dataset.tool='op';
  const text=DATA.aufgaben[current];
  const tokens=tokenize(text);
  const stage=document.getElementById('stage');
  stage.innerHTML='';
  const card=document.createElement('div');card.className='card';
  const hdr=document.createElement('div');hdr.className='card-header';
  hdr.innerHTML='<span class="card-label">Aufgabe</span><span class="card-num">'+(current+1)+' / '+TOTAL+'</span>';
  card.appendChild(hdr);
  const body=document.createElement('div');body.className='card-body';
  const instr=document.createElement('p');instr.className='aufgabe-instruction';
  instr.textContent='W\u00e4hle eine Farbe, dann klicke auf W\u00f6rter um sie zu markieren:';
  body.appendChild(instr);
  body.appendChild(buildLegendInteractive());
  const itext=document.createElement('div');itext.className='interactive-text';
  tokens.forEach((tok,i)=>{
    if(/^\s+$/.test(tok)){itext.appendChild(document.createTextNode(tok));}
    else{
      const span=document.createElement('span');span.className='word';span.textContent=tok;span.dataset.idx=i;
      span.addEventListener('click',()=>markWord(span,i));itext.appendChild(span);
    }
  });
  body.appendChild(itext);
  const hint=document.createElement('div');hint.className='hint-row';
  hint.innerHTML='<div class="hint-dot" style="color:var(--muted)"></div><span>Erneuter Klick auf ein markiertes Wort hebt die Markierung auf</span>';
  body.appendChild(hint);
  const hr=document.createElement('hr');hr.className='divider';hr.style.marginTop='1.5rem';body.appendChild(hr);
  const btnRow=document.createElement('div');btnRow.className='btn-row';btnRow.style.marginTop='1.25rem';
  const btnL=document.createElement('button');btnL.className='btn btn-primary';btnL.textContent='L\u00f6sung anzeigen \u2192';
  btnL.addEventListener('click',()=>renderLoesung(tokens));btnRow.appendChild(btnL);
  if(current>0){
    const btnB=document.createElement('button');btnB.className='btn btn-ghost';btnB.textContent='\u2190 Zur\u00fcck';
    btnB.addEventListener('click',()=>{current--;setProgress(current);renderAufgabe();});btnRow.appendChild(btnB);
  }
  body.appendChild(btnRow);card.appendChild(body);stage.appendChild(card);
  setProgress(current);window.scrollTo(0,0);
}

function renderLoesung(tokens){
  const l=DATA.loesungen[current];
  const stage=document.getElementById('stage');stage.innerHTML='';
  const card=document.createElement('div');card.className='card';
  const hdr=document.createElement('div');hdr.className='card-header';
  hdr.innerHTML='<span class="card-label">L\u00f6sung</span><span class="card-num">'+(current+1)+' / '+TOTAL+'</span>';
  card.appendChild(hdr);
  const body=document.createElement('div');body.className='card-body';
  body.appendChild(buildLegendStatic());
  const compare=document.createElement('div');compare.className='compare-row';
  compare.innerHTML='<div class="compare-col"><label>Deine Markierung</label><div class="compare-text" id="yourText"></div></div>'
    +'<div class="compare-col"><label>Musterl\u00f6sung</label><div class="compare-text">'+segmentsToHtml(l.segments)+'</div></div>';
  body.appendChild(compare);
  const badge=document.createElement('span');badge.className='badge badge-'+l.badgeStyle;badge.textContent=l.badge;body.appendChild(badge);
  const hr1=document.createElement('hr');hr1.className='divider';body.appendChild(hr1);
  const sl=document.createElement('div');sl.className='steps-label';sl.textContent='Schrittweise Bearbeitung';body.appendChild(sl);
  const ul=document.createElement('ul');ul.className='step-list';
  l.steps.forEach((s,i)=>{const li=document.createElement('li');li.innerHTML='<div class="step-num">'+(i+1)+'</div><span>'+esc(s)+'</span>';ul.appendChild(li);});
  body.appendChild(ul);
  const mh=document.createElement('div');mh.className='hint-block hint-mat';
  mh.innerHTML='<span class="hint-icon">&#9432;</span><span>'+esc(l.matHint)+'</span>';body.appendChild(mh);
  if(l.qualHint){
    const qh=document.createElement('div');qh.className='hint-block hint-qua';
    qh.innerHTML='<span class="hint-icon">&#9670;</span><span>'+esc(l.qualHint)+'</span>';body.appendChild(qh);
  }
  const hr2=document.createElement('hr');hr2.className='divider';body.appendChild(hr2);
  const btnRow=document.createElement('div');btnRow.className='btn-row';btnRow.style.marginTop='1.25rem';
  const isLast=current===TOTAL-1;
  if(isLast){
    const btnD=document.createElement('button');btnD.className='btn btn-success';btnD.textContent='Alle Aufgaben abgeschlossen \u2713';
    btnD.addEventListener('click',renderDone);btnRow.appendChild(btnD);
  } else {
    const btnN=document.createElement('button');btnN.className='btn btn-primary';btnN.textContent='N\u00e4chste Aufgabe \u2192';
    btnN.addEventListener('click',()=>{current++;renderAufgabe();});btnRow.appendChild(btnN);
  }
  const btnA=document.createElement('button');btnA.className='btn btn-ghost';btnA.textContent='Aufgabe nochmal markieren';
  btnA.addEventListener('click',()=>renderAufgabe());btnRow.appendChild(btnA);
  body.appendChild(btnRow);card.appendChild(body);stage.appendChild(card);
  document.getElementById('yourText').innerHTML=buildUserMarkedHtml(tokens);
  window.scrollTo(0,0);
}

function renderDone(){
  setProgress(TOTAL);
  const stage=document.getElementById('stage');stage.innerHTML='';
  const card=document.createElement('div');card.className='card';
  card.innerHTML='<div class="card-body done-card"><div class="done-icon">&#127891;</div><div class="done-title">Alle 30 Aufgaben gemeistert!</div><p class="done-sub">Du hast alle Aufgabenstellungen analysiert und die L\u00f6sungen verglichen.</p><div class="btn-row" style="justify-content:center"><button class="btn btn-primary" id="btnRestart">Von vorne beginnen</button></div></div>';
  stage.appendChild(card);
  document.getElementById('btnRestart').addEventListener('click',()=>{current=0;setProgress(0);renderAufgabe();});
  window.scrollTo(0,0);
}

initDropdown();
renderAufgabe();
</script>
</body>
